- Database
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of ParadeDB spend. ParadeDB is consumed as SQL over the Postgres
  wire protocol, not as a metered API, so cost is driven by infrastructure
  (compute, memory, storage, IO) rather than per-request or per-token charges.
  The Community extensions are free under AGPL-3.0; cost arises from self-hosted
  infrastructure, commercial Enterprise licensing, the fully managed ParadeDB
  Cloud (referenced around $0.193/hour), or BYOC agreements. Managed and
  enterprise pricing is sales-led, so this artifact is not reconciled.
notes: >-
  Verify managed-cloud hourly rates and enterprise/BYOC license terms with
  ParadeDB during reconciliation; self-hosted cost is the underlying Postgres
  infrastructure bill.
sources:
- https://www.paradedb.com
- https://www.paradedb.com/pricing
- https://docs.paradedb.com/welcome/introduction
